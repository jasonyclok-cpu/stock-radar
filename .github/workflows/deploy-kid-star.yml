name: Deploy 星星學園 to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['kid-star/**', '.github/workflows/deploy-kid-star.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: kid-star/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: kid-star

      - name: Build
        run: npm run build
        working-directory: kid-star
        env:
          BASE_PATH: /stock-radar/

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: kid-star/dist

      - id: deployment
        uses: actions/deploy-pages@v4
